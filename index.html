<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="canonical" href="https://zyzhuarch.github.io/96-Urban-Regeneration-Ltd./" />
    <link rel="icon" href="https://zyzhuarch.github.io/96-Urban-Regeneration-Ltd./img/96.svg" type="image/svg+xml">
    
    <title>用九六都市更新 - 網站搬家中</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f4f4; 
        }
        .btn-u96 {
            background-color: #929000; 
            border-color: #929000;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .btn-u96:hover {
            background-color: #7a7800; 
            border-color: #7a7800;
            color: #ffffff;
            transform: translateY(-2px); 
            box-shadow: 0 4px 10px rgba(146, 144, 0, 0.3);
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow border-0 rounded-4" style="max-width: 28rem;">
        <div class="card-body text-center p-5">
            
            <h2 class="fw-bold mb-3" style="color: #A5570A;">我們搬家囉！🏠</h2>
            
            <p class="text-muted mb-4">
                「用九六都市更新」的官方網站已經移至全新網址。<br>
                系統將在 <strong class="text-danger fs-5" id="countdown">3</strong> 秒後自動為您跳轉...
            </p>
            
            <a href="https://zyzhuarch.github.io/96-Urban-Regeneration-Ltd./" class="btn btn-u96 btn-lg rounded-pill px-4">
                立即前往新網站 ✨
            </a>
            
        </div>
    </div>

    <script>
        // 設定要跳轉的新網址
        const newUrl = "https://zyzhuarch.github.io/96-Urban-Regeneration-Ltd./";
        
        // 抓取畫面上的數字元素
        const countdownElement = document.getElementById('countdown');
        let timeLeft = 3; // 從 3 秒開始

        // 設定每 1000 毫秒 (1秒) 執行一次的計時器
        const timer = setInterval(() => {
            timeLeft--; // 秒數減 1
            countdownElement.innerText = timeLeft; // 更新畫面上的數字

            // 當秒數歸零時，執行跳轉並停止計時器
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = newUrl;
            }
        }, 1000);
    </script>
</body>
</html>
